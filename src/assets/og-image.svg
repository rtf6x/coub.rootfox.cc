<?xml version="1.0" encoding="UTF-8"?>
<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0" stop-color="#191919"/>
            <stop offset="1" stop-color="#0e0e0e"/>
        </linearGradient>
        <filter id="s" x="-20%" y="-20%" width="140%" height="140%">
            <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="rgba(0,0,0,.6)"/>
        </filter>
    </defs>

    <rect width="1200" height="630" fill="url(#g)"/>

    <!-- tile -->
    <g transform="translate(140,145)" filter="url(#s)">
        <rect x="0" y="0" width="340" height="340" rx="36" fill="#111" stroke="#2a2a2a"/>
        <path d="M140 110l120 70-120 70z" fill="#ff7a18"/>
        <circle cx="95" cy="130" r="20" fill="#ff7a18" opacity="0.9"/>
    </g>

    <!-- title -->
    <text x="520" y="300" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="64" font-weight="800" fill="#ffffff">
        Coub Player
    </text>

    <!-- footer (url) -->
    <text x="520" y="370" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="22" fill="#ff9b4a">
        https://coub.rootfox.cc/
    </text>
</svg>
